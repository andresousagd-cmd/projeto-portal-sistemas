<div class="card" [class.compact]="compact()" (click)="onCardClick()" role="button" tabindex="0">
  @if (rank()) {
    <span class="rank">{{ rank() }}</span>
  }
  <div class="card-body">
    <div class="icon" [style.background]="sistema().corIcone">
      {{ sistema().sigla.substring(0, 2) }}
    </div>
    <div class="info">
      <h3>{{ sistema().nome }}</h3>
      <p>{{ sistema().descricao }}</p>
      @if (!compact()) {
        <span class="categoria">{{ sistema().categoria }}</span>
      }
    </div>
  </div>
  @if (showStar()) {
    <button
      type="button"
      class="star-btn"
      [class.active]="sistema().favorito"
      (click)="onFavorite($event)"
      [attr.aria-label]="sistema().favorito ? 'Remover favorito' : 'Adicionar favorito'"
    >
      ★
    </button>
  }
  @if (sistema().lancamento && !compact()) {
    <app-badge class="card-badge" type="novo" label="Novo" />
  }
</div>
