<aside class="sidebar">
  <div class="brand">
    <img src="/images/logo-caixa-x.png" alt="Caixa Econômica Federal" class="logo" />
    <span class="brand-text">Portal<br /><small>de Sistemas</small></span>
  </div>

  <nav class="nav">
    @for (item of navItems; track item.label) {
      <a
        [routerLink]="item.path"
        [fragment]="item.fragment"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/home' && !item.fragment }"
        class="nav-item"
      >
        <span class="icon">{{ item.icon }}</span>
        {{ item.label }}
        @if (item.path === '/meu-dia' && meuDia.quantidade() > 0) {
          <span class="badge">{{ meuDia.quantidade() }}</span>
        }
      </a>
    }

    <div class="nav-group">
      <button type="button" class="nav-item nav-toggle" (click)="toggleCategorias()">
        <span class="icon">▦</span>
        Categorias
        <span class="chevron" [class.open]="categoriasAbertas()">›</span>
      </button>
      @if (categoriasAbertas()) {
        <div class="nav-sub">
          @for (cat of categorias; track cat) {
            <a
              [routerLink]="['/search']"
              [queryParams]="{ categoria: cat }"
              routerLinkActive="active"
              class="nav-item nav-sub-item"
            >
              {{ cat }}
            </a>
          }
        </div>
      }
    </div>
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/home" class="nav-item">
      <span class="icon">⚙</span> Configurações
    </a>
    <button type="button" class="nav-item logout" (click)="logout()">
      <span class="icon">⎋</span> Sair
    </button>
  </div>
</aside>
